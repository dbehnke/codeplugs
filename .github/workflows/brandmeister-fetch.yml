name: BrandMeister Fetch & Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

  push:
    branches: [main, master]
    paths:
      - 'filters/filter-brandmeister.csv'

jobs:
  fetch:
    name: Fetch BrandMeister Contacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Fetch BrandMeister contacts
        id: fetch
        run: |
          bun run scripts/fetch-brandmeister.ts
          echo "lines=$(wc -l < filters/filter-brandmeister.csv | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Upload filter file
        uses: actions/upload-artifact@v7
        with:
          name: filter-brandmeister-${{ github.run_id }}
          path: filters/filter-brandmeister.csv
          retention-days: 1

  generate:
    name: Generate Filtered Contacts
    runs-on: ubuntu-latest
    needs: fetch
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download filter file
        uses: actions/download-artifact@v7
        with:
          name: filter-brandmeister-${{ github.run_id }}
          path: filters/

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend
        run: |
          cd frontend
          bun install
          bun run build

      - name: Generate contacts
        id: generate
        run: |
          mkdir -p outputs
          rm -f outputs/brandmeister-*.csv
          task generate-brandmeister-clean

          first_file=$(ls -1 outputs/brandmeister-*.csv | head -1)
          timestamp=$(echo "$first_file" | grep -oE '[0-9]{8}_[0-9]{6}')
          echo "timestamp=$timestamp" >> $GITHUB_OUTPUT

      - name: Upload generated contacts
        uses: actions/upload-artifact@v7
        with:
          name: brandmeister-contacts-${{ github.run_id }}
          path: outputs/brandmeister-*.csv
          retention-days: 1

  release:
    name: Create Pre-Release
    runs-on: ubuntu-latest
    needs: generate
    permissions:
      contents: write
    steps:
      - name: Clean outputs directory
        run: rm -rf outputs/ && mkdir -p outputs/

      - name: Download generated contacts
        uses: actions/download-artifact@v7
        with:
          name: brandmeister-contacts-${{ github.run_id }}
          path: outputs/

      - name: Checkout for tag cleanup
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Cleanup old pre-releases (keep last 4)
        run: |
          echo "Fetching existing pre-releases..."
          OLD_RELEASES=$(gh release list --limit 100 --json tagName,createdAt -q \
            '.[] | select(.tagName | startswith("bm-pre-")) | .tagName' 2>/dev/null | \
            tail -n +5)

          if [ -n "$OLD_RELEASES" ]; then
            echo "Deleting releases beyond last 4:"
            echo "$OLD_RELEASES"
            echo "$OLD_RELEASES" | while read -r tag; do
              gh release delete "$tag" --yes 2>/dev/null || true
              git push --delete origin "$tag" 2>/dev/null || true
            done
          else
            echo "No releases to clean up."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

      - name: Get timestamp
        id: timestamp
        run: |
          timestamp=$(date +%Y-%m-%d)
          echo "timestamp=$timestamp" >> $GITHUB_OUTPUT

      - name: Create pre-release
        uses: softprops/action-gh-release@v3
        with:
          name: "BrandMeister Pre-Release ${{ steps.timestamp.outputs.timestamp }}"
          tag_name: "bm-pre-${{ steps.timestamp.outputs.timestamp }}"
          draft: false
          prerelease: true
          files: outputs/brandmeister-*.csv
          body: |
            ## BrandMeister Filtered Contacts

            Filter talkgroups: 31261, 31266, 3126, 313136

            Auto-generated by GitHub Actions.
          token: ${{ secrets.GITHUB_TOKEN }}
