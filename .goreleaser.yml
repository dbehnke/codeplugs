version: 2

project_name: codeplugs

before:
  hooks:
    - go mod tidy
    - task frontend-build

builds:
  - id: codeplugs
    main: ./main.go
    binary: codeplugs
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: codeplugs
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - outputs/brandmeister-*.csv

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - '^refactor:'
      - 'Merge pull request'
      - 'Merge branch'
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: 'Bug fixes'
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: dbehnke
    name: codeplugs
  prerelease: auto
  draft: false
  name_template: "{{ .ProjectName }} {{ .Version }}"
  header: |
    ## Release {{ .Version }}
    
    Full changelog: https://github.com/dbehnke/codeplugs/compare/{{ .PreviousTag }}...{{ .Tag }}
  footer: |
    ## Assets
    
    - **codeplugs_{{ .Version }}_linux_amd64.tar.gz** - Linux AMD64
    - **codeplugs_{{ .Version }}_linux_arm64.tar.gz** - Linux ARM64
    - **codeplugs_{{ .Version }}_darwin_amd64.tar.gz** - macOS Intel
    - **codeplugs_{{ .Version }}_darwin_arm64.tar.gz** - macOS Apple Silicon
    - **codeplugs_{{ .Version }}_windows_amd64.zip** - Windows AMD64
    - **checksums.txt** - SHA256 checksums
